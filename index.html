<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Shop - Used Cars</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">🚗 Auto Shop</div>
            <nav class="nav">
                <a href="#listings">Cars</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Find Your Perfect Used Car</h1>
            <p>Quality vehicles at great prices</p>
        </div>
    </section>

    <!-- Search & Filter Section -->
    <section class="filters-section">
        <div class="container">
            <h2>Search & Filter</h2>
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Search by brand or model..." class="filter-input">
                
                <select id="yearFilter" class="filter-select">
                    <option value="">All Years</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                    <option value="2015">2015 and older</option>
                </select>

                <select id="priceFilter" class="filter-select">
                    <option value="">All Prices</option>
                    <option value="5000">Under €5,000</option>
                    <option value="10000">Under €10,000</option>
                    <option value="15000">Under €15,000</option>
                    <option value="20000">Under €20,000</option>
                </select>

                <select id="fuelFilter" class="filter-select">
                    <option value="">All Fuel Types</option>
                    <option value="petrol">Petrol</option>
                    <option value="diesel">Diesel</option>
                    <option value="hybrid">Hybrid</option>
                    <option value="electric">Electric</option>
                </select>

                <button onclick="filterCars()" class="filter-btn">Apply Filters</button>
                <button onclick="resetFilters()" class="reset-btn">Reset</button>
            </div>
        </div>
    </section>

    <!-- Car Listings -->
    <section id="listings" class="listings-section">
        <div class="container">
            <h2>Available Cars</h2>
            <div id="carListings" class="car-grid">
                <!-- Cars will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Car Modal (for detailed view) -->
    <div id="carModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <div id="carGallery" class="car-gallery">
                    <!-- Gallery will be loaded here -->
                </div>
                <div id="carDetails" class="car-details">
                    <!-- Car details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Contact Section -->
    <section id="contact" class="contact-section">
        <div class="container">
            <h2>Contact Us</h2>
            <p>Interested in a car? Send us a message!</p>
            <form id="contactForm" class="contact-form" onsubmit="sendMessage(event)">
                <input type="text" id="contactName" placeholder="Your Name" required>
                <input type="email" id="contactEmail" placeholder="Your Email" required>
                <input type="tel" id="contactPhone" placeholder="Your Phone" required>
                <textarea id="contactMessage" placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
            <div id="formStatus" class="form-status"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Auto Shop. All rights reserved. | Built with care for you!</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
